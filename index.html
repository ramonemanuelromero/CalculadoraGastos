<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Familiar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./estilos/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>
    <div class="container">
        <h1>Calculadora de gastos</h1>

        <div class="card">
            <h3>🛒 Agregar Nuevo Ítem</h3>
            <div class="input-group">
                <div class="field">
                    <label for="nombre">Producto</label>
                    <input id="nombre" placeholder="Ej: Manzanas">
                </div>
                <div class="field">
                    <label for="cantidad">Cantidad</label>
                    <input id="cantidad" type="number" placeholder="0">
                </div>
                <div class="field">
                    <label for="precio">Precio Unit.</label>
                    <input id="precio" type="number" placeholder="$0.00">
                </div>
                <button class="btn-primary" onclick="agregarItem()">
                    <span>+</span> Agregar
                </button>
                <button class="btn-export" onclick="exportarExcel()">
                    <span>📊</span> Exportar Excel
                </button>
            </div>
        </div>

        <div class="card">
            <h3>📋 Lista de Compras</h3>
            <div class="table-container">
                <table id="tabla">
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Total</th>
                            <th>Precio</th>
                            <th>Enzo</th>
                            <th>Nora</th>
                            <th>Rabri</th>
                            <th>Resto</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h3>💰 Resumen de Gastos</h3>
            <div id="totales" class="totales-grid">
                </div>
        </div>
    </div>

    <script src="app.js" defer></script>
</body>

</html>
